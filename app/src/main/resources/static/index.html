<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Role</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="style.css">
    <script src="./js/util.js" defer></script>
    <script src="./js/render.js" defer></script>
    <script src="./js/components/header.js" defer></script>
    <script src="./js/components/footer.js" defer></script>
</head>
<body>
    <div class="container" id="container">
        <div class="wrapper" id="wrapper">
            <div id="header"></div>

            <main class="main-content" id="main-content">
                <h2 id="role-heading">Select Your Role</h2>
                <button id="admin-role-btn" onclick="selectRole('admin')">Admin</button>
                <button id="doctor-role-btn" onclick="selectRole('doctor')">Doctor</button>
                <button id="patient-role-btn" onclick="selectRole('patient')">Patient</button>
            </main>

            <div id="footer"></div>
        </div>
    </div>

    <div id="modal" class="modal" style="display: none;" aria-hidden="true">
        <div class="modal-content" id="modal-content">
            <button id="closeModal" type="button">Close</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module" src="../js/services/index.js" defer></script>
</body>
</html>
